global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'harness'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /metrics

  - job_name: 'mcp-server'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /metrics
